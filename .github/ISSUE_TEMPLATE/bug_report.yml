name: 缺陷报告
description: 报告可重现的错误或回归
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        请勿上传登录凭据、Cookie、Token、未授权文章或真实资料包。
  - type: dropdown
    id: app
    attributes:
      label: 受影响组件
      options:
        - 英诺资讯采集
        - 英诺资讯阅读
        - Python 核心模块
        - 打包与发布工具
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 版本与环境
      placeholder: "0.1.0 / macOS 15.x / Apple Silicon"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 重现步骤
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
